<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0-1 Knapsack DP Visualizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="container glass-panel">
        <header>
            <h1>0-1 Knapsack Optimizer</h1>
            <p>Dynamic Programming Implementation</p>
        </header>

        <main>
            <section class="input-section">
                <div class="input-group">
                    <label for="capacity">Knapsack Capacity (W)</label>
                    <input type="number" id="capacity" min="1" max="50" value="8">
                </div>
                
                <div class="items-configuration">
                    <div class="items-header">
                        <h2>Items</h2>
                        <button id="add-item-btn" class="btn primary">Add Item</button>
                    </div>
                    <div id="items-container" class="items-list">
                        <!-- Items will be generated here by JS -->
                    </div>
                </div>

                <button id="solve-btn" class="btn calculate-btn">Solve Knapsack</button>
            </section>

            <section class="results-section hidden" id="results-section">
                <div class="result-summary">
                    <h2>Optimal Solution</h2>
                    <div class="max-value-box">
                        <span class="label">Maximum Value:</span>
                        <span class="value" id="max-value">0</span>
                    </div>
                    <div class="selected-items" id="selected-items">
                        <!-- Selected items listed here -->
                    </div>
                </div>

                <div class="dp-table-container">
                    <h3>DP Table Visualization</h3>
                    <p class="table-hint">Hover over cells to trace back the solution.</p>
                    <div class="table-wrapper">
                        <table id="dp-table">
                            <!-- DP Matrix rendered here -->
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
